  - type: Features
    data:
      - name: Universal Package Management
        description: >-
          Single repository manager supporting 30+ package formats including
          Maven, npm, NuGet, PyPI, Docker, Helm, Conda, Conan, and more.
      - name: Artifact Metadata and Search
        description: >-
          Rich metadata tagging and AQL query language for finding artifacts
          based on properties, statistics, dates, and custom attributes.
      - name: Build Integration
        description: >-
          Native CI/CD integration publishing build information to track
          which artifacts were produced by which build, enabling full
          artifact traceability.
      - name: Security and Permissions
        description: >-
          Fine-grained permission targets, LDAP/SAML/SSO integration, API
          key management, and access tokens for secure artifact access control.
      - name: Replication
        description: >-
          Push and pull replication across multiple Artifactory instances
          for geo-distributed teams and disaster recovery.
      - name: Docker Registry
        description: >-
          Full Docker Registry v2 API compliance for pushing, pulling, and
          managing Docker images with automated vulnerability scanning.
  - type: UseCases
    data:
      - name: CI/CD Pipeline Integration
        description: >-
          Development teams integrate Artifactory with Jenkins, GitHub Actions,
          and other CI/CD tools to store, version, and distribute build artifacts.
      - name: Container Registry
        description: >-
          Platform engineering teams use Artifactory as an enterprise Docker
          registry with security scanning, access controls, and promotion workflows.
      - name: Dependency Proxy
        description: >-
          Organizations proxy public package registries (npm, PyPI, Maven Central)
          through Artifactory to cache dependencies, apply security policies,
          and ensure build reproducibility.
      - name: Release Management
        description: >-
          Release engineers promote artifacts through staging environments using
          build promotion, managing the lifecycle from snapshot to release.
  - type: Integrations
    data:
      - name: Jenkins
        description: >-
          Official Jenkins Artifactory Plugin for publishing artifacts and
          build information from Jenkins pipelines.
      - name: GitHub Actions
        description: >-
          JFrog GitHub Actions for integrating Artifactory into GitHub CI/CD workflows.
      - name: JFrog Xray
        description: >-
          Deep integration with JFrog Xray for continuous security and compliance
          scanning of artifacts and dependencies.
      - name: JFrog Pipelines
        description: >-
          Native integration with JFrog Pipelines for end-to-end CI/CD
          orchestration using Artifactory as the artifact store.
