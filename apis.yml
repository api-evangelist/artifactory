aid: artifactory
name: JFrog Artifactory
description: >-
  JFrog Artifactory is a universal artifact repository manager supporting all
  major package formats and build tools including Maven, Gradle, npm, NuGet,
  PyPI, Docker, Helm, RubyGems, CocoaPods, and more. As the central hub of
  the JFrog Platform, Artifactory stores, manages, and distributes binary
  artifacts across the entire software development lifecycle. It integrates
  with CI/CD pipelines through native plugins for Jenkins, GitHub Actions,
  CircleCI, and other tools. Artifactory provides comprehensive REST APIs for
  managing repositories, artifacts, builds, security, and system configuration
  programmatically.
